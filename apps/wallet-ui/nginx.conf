server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/clickstream/ {
        proxy_pass http://clickstream-api:8001/api/clickstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Без trailing slash, чтобы ловить и /api/users (список), и /api/users/<id>/...
    # (balance/transactions). С `/api/users/` слешем prefix-match не срабатывал на
    # коллекционный URL, fetchUsers() получал index.html и JSON.parse падал.
    location /api/users {
        proxy_pass http://wallet-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

