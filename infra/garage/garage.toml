metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "s3:3901"
# rpc_secret подаётся через env GARAGE_RPC_SECRET (см. .env)

[s3_api]
# us-east-1 чтобы совпадало с Nessie/Hadoop-aws/StarRocks дефолтом
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"
root_domain = ".s3.local"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.local"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
# admin_token подаётся через env GARAGE_ADMIN_TOKEN
